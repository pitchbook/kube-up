apiVersion: batch/v1
kind: CronJob
metadata:
  name: null
  namespace: null
  labels:
    app.kubernetes.io/managed-by: kube-up
  annotations: null
spec:
  schedule: null
  concurrencyPolicy: Allow
  suspend: false
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/managed-by: kube-up
          annotations:
            cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
        spec:
          nodeSelector: null
