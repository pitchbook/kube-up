apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "kubeUp.apiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeUp.apiLabels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    verbs:
      - get
      - list
    resources:
      - pods
  - apiGroups:
      - batch
    verbs:
      - get
    resources:
      - jobs
  - apiGroups:
      - pitchbook.com
    verbs:
      - "*"
    resources:
      - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "kubeUp.apiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeUp.apiLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kubeUp.apiName" . }}
subjects:
- kind: ServiceAccount
  name: {{ template "kubeUp.apiName" . }}
  namespace: {{ .Release.Namespace }}
