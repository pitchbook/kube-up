apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "kubeUp.apiName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeUp.apiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.deployment.replicas }}
  selector:
    matchLabels:
      {{- include "kubeUp.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeUp.apiLabels" . | nindent 8 }}
{{- if .Values.api.deployment.annotations -}}
      annotations:
{{- with .Values.api.deployment.annotations }}
{{ toYaml . | indent 8 }}
{{- end }}
{{- end }}
    spec:
      serviceAccountName: {{ template "kubeUp.apiName" . }}
      containers:
        - name: {{ template "kubeUp.apiName" . }}
          image: "{{ include "kubeUp.image" . }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: {{ template "portNames.container" . }}
              protocol: {{ .Values.api.deployment.protocol }}
              containerPort: {{ .Values.api.deployment.port }}
          resources:
{{- with .Values.api.resources }}
{{ toYaml . | indent 12 }}
{{- end }}
          env:
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.api.config.logging.level | quote }}
            - name: EXTRA_METRICS_LABELS
              value: {{ .Values.api.config.extraMetricsLabels | toJson | quote }}
{{- with .Values.api.deployment.extraEnv }}
{{ toYaml . | indent 12 }}
{{- end }}
          command:
            - sh
          args:
            - "-c"
            - "python -m app.application"
          livenessProbe:
            httpGet:
              path: {{ template "probes.endpoint" . }}
              port: {{ template "portNames.container" . }}
            initialDelaySeconds: 2
            timeoutSeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: {{ template "probes.endpoint" . }}
              port: {{ template "portNames.container" . }}
            initialDelaySeconds: 2
            timeoutSeconds: 5
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command:
                  - "/bin/sh"
                  - "-c"
                  - "sleep 15"
      restartPolicy: Always
      nodeSelector:
{{- with .Values.api.nodeSelector }}
{{ toYaml . | indent 8 }}
{{- end }}
      affinity:
{{- with .Values.api.affinity }}
{{ toYaml . | indent 8 }}
{{- end }}
      tolerations:
{{- with .Values.api.tolerations }}
{{ toYaml . | indent 8 }}
{{- end }}
