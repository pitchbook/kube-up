apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "kubeUp.managerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeUp.managerLabels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - "*"
  - apiGroups:
      - pitchbook.com
    resources:
      - "*"
    verbs:
      - "*"
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "kubeUp.managerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeUp.managerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kubeUp.managerName" . }}
subjects:
- kind: ServiceAccount
  name: {{ template "kubeUp.managerName" . }}
  namespace: {{ .Release.Namespace }}
