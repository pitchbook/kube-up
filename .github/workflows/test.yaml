name: Test
on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  python-lint:
    name: Python linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: true

      - name: Setup
        run: uv sync

      - name: Run hooks
        uses: j178/prek-action@53276d8b0d10f8b6672aa85b4588c6921d0370cc # v2

  chart-lint:
    name: Helm chart linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.12.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2

      - name: Test chart
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          persist-credentials: false

      - name: Setup
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build
        id: docker_build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: false

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8
        with:
          enable-cache: true

      - name: Setup
        run: uv sync

      - name: Test
        run: uv run pytest

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
        with:
          persist-credentials: false

      - name: Start minikube
        uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/v2.17.2/skaffold-linux-amd64
          install skaffold /usr/local/bin/skaffold

      - name: Deploy
        run: cd testing && skaffold run --profile=ci

      - name: Trigger check
        run: |
          # Wait for the operator to reconcile KubeUpCheck and create the CronJob
          for i in $(seq 1 5); do
            if kubectl get cronjob example-check -n kube-up &>/dev/null; then
              echo "CronJob created"
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "ERROR: CronJob not created after 60s"
              kubectl get events -n kube-up --sort-by='.lastTimestamp'
              exit 1
            fi
            echo "Waiting for CronJob... ($i/5)"
            sleep 2
          done
          kubectl create job --from=cronjob/example-check ci-test-run -n kube-up

      - name: Wait for check job to complete
        run: kubectl wait --for=condition=complete job/ci-test-run -n kube-up --timeout=60s

      - name: Verify KubeUpState
        run: |
          for i in $(seq 1 5); do
            ok=$(kubectl get kustates.pitchbook.com example-check -n kube-up -o jsonpath='{.spec.ok}')
            if [ "$ok" = "true" ]; then
              echo "KubeUpState ok=true"
              exit 0
            fi
            echo "Attempt $i/5: KubeUpState ok=$ok, retrying..."
            sleep 2
          done
          echo "ERROR: KubeUpState never reached ok=true"
          kubectl get kustates.pitchbook.com example-check -n kube-up -o yaml
          exit 1

      - name: Verify metrics endpoint
        run: |
          kubectl port-forward -n kube-up svc/kube-up-api 8080:80 &
          # Wait for port-forward to be ready
          sleep 3
          curl -fs http://localhost:8080/metrics | grep -q kubeup_check
          echo "kubeup_check metric present in /metrics"
