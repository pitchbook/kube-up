name: Release chart

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    # Pseudo-enforce version change in Chart.yaml
    paths:
      - charts/kube-up/Chart.yaml

jobs:
  release-chart:
    name: Release chart
    runs-on: ubuntu-latest

    permissions:
      contents: write # to push chart release and create a release (helm/chart-releaser-action)
      packages: write # needed for ghcr access
      id-token: write # needed for keyless signing

    steps:
      - name: Checkout
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Fetch
        run: git fetch --prune --unshallow

      - name: Configure Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.9.2

      - name: Set up cosign-installer
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4

      - name: Log in
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          cd charts
          helm package ${REPO_NAME}
          helm push *.tgz "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts"
